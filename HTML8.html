<html>
    <head>
        <title>Table</title>
    </head>
    <body>
        <table border="2" width="250" height="250">
            <tr>
                <th colspan="4" align="center" style="color: crimson;">Table Using Colspan & rowspan</th>
            </tr>
            <tr>
                <th colspan="4" align="center">Kitty Self Store</th>
            </tr>
            <tr>
                <th width="200px">Item/Desc</th>
                <th width="150px">QTY</th>
                <th width="200px">Price/Unit</th>
                <th width="150px">Total</th>
            </tr>
            <tr>
                <td>Parle-G</td>
                <td>2</td>
                <td>5</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Kitkat</td>
                <td>4</td>
                <td>10</td>
                <td>40</td>
            </tr>
            <tr>
                <td>Perk</td>
                <td>5</td>
                <td>10</td>
                <td>50</td>
            </tr>
            <tr>
                <td colspan="3">Sub-Total</td>
                <td>100</td>
            </tr>
            <tr>
                <td colspan="2">Tax</td>
                <td>5%</td>
                <td>41</td>
            </tr>
            <tr>
                <td colspan="3">Total</td>
                <td>141</td>
            </tr>
        </table>
    </body>
</html>
