<html>
    <head>
        <title>Table</title>
    </head>
    <body>
        <table border="2" width="400" height="200" cellspacing="0">
            <tr>
                <th rowspan="2">State of health</th>
                <th colspan="2">Fasting Value</th>
                <th>After Eating</th>
            </tr>
            <tr>
                <td>Minimum</td>
                <td>Maximum</td>
                <td>2 hours after eating</td>
            </tr>
            <tr>
                <td>Healthy</td>
                <td>50</td>
                <td>100</td>
                <td>Less than 120</td>
            </tr>
            <tr>
                <td>Pre-Diabetes</td>
                <td>105</td>
                <td>135</td>
                <td>150-210</td>
            </tr>
            <tr>
                <td>Diabetes</td>
                <td>More than 130</td>
                <td>N/A</td>
                <td>More than 150</td>
            </tr>
        </table>
    </body>
</html>
